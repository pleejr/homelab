---
- name: Get Network Interfaces
  ansible.builtin.setup:
    filter: ansible_interfaces
  register: network_facts

- name: Parse Default Network Interface
  set_fact:
    default_interface: "{{ (network_facts.ansible_facts.ansible_interfaces | select('search', 'eth') | list)[0] }}"

# Pi Imager's Ubuntu image hands network management to cloud-init via
# /etc/netplan/50-cloud-init.yaml. Netplan merges YAML files alphabetically
# with later files winning, so we must disable cloud-init's network config
# and drop its file — otherwise our static config is silently overridden.
- name: Disable cloud-init Network Management
  copy:
    dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
    owner: root
    group: root
    mode: '0644'
    content: |
      network: {config: disabled}

- name: Remove cloud-init Netplan File
  ansible.builtin.file:
    path: /etc/netplan/50-cloud-init.yaml
    state: absent

- name: Generate Netplan Configuration
  copy:
    dest: /etc/netplan/01-netcfg.yaml
    owner: root
    group: root
    mode: '0600'
    content: |
      network:
        version: 2
        ethernets:
          {{ default_interface }}:
            dhcp4: no
            addresses:
              - {{ node_ip_allocation }}/24
            routes:
              - to: default
                via: {{ node_gateway }}
            nameservers:
              addresses:
                - {{ nameserver_01 }}
                - {{ nameserver_02 }}
  notify: Apply Netplan

- name: Wait for IP Configuration
  wait_for:
    host: "{{ node_ip_allocation }}"
    port: 22
    timeout: 60
    delay: 10

- name: Reconnect on New IP
  meta: reset_connection
