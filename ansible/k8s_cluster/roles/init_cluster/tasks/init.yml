- name: Check Initialization Status
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_config

- name: Initialize Kubernetes Control Plane
  command: kubeadm init --pod-network-cidr={{ pod_network_cidr }} --service-cidr={{ service_cidr }} --control-plane-endpoint={{ control_plane_endpoint_name }} --upload-certs
  register: kubeadm_output
  when: not kubeadm_config.stat.exists
  changed_when: kubeadm_output.rc == 0
  async: 600
  poll: 10

- name: Log Initialization Output
  copy:
    content: "{{ kubeadm_output.stdout }}\n{{ kubeadm_output.stderr }}"
    dest: /var/log/kubeadm-init.log
  when: kubeadm_output is defined and kubeadm_output.stdout is defined

# NB: lookup('env', 'HOME') evaluates on the controller, not the remote host —
# so on a Mac controller it writes to /Users/<user>/ rather than /home/<user>/.
- name: Create Directory - $HOME/.kube
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Copy Kubernetes Admin.conf
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
    remote_src: true

- name: Change Kubeconfig Ownership
  file:
    path: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
